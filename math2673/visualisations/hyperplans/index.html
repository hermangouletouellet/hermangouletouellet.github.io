
<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Hyperplans</title>
    <script src="https://sagecell.sagemath.org/static/embedded_sagecell.js"></script>
    <script>
    // Make the div with id 'mycell' a Sage cell
    sagecell.makeSagecell({inputLocation:  '#mycell',
                           template:       sagecell.templates.minimal,
                           evalButtonText: 'Activer'});
    // Make *any* div with class 'compute' a Sage cell
    sagecell.makeSagecell({inputLocation: 'div.compute',
                           evalButtonText: 'Évaluer'});
    </script>
  </head>
  <body>
  <h1>Visualisation: hyperplans</h1>

  <h2>Hyperplan déterminé par le vecteur (1,2,3)</h2>
  Cliquez sur "Évaluer" pour exécuter le code.
    <div class="compute"><script type="text/x-sage">
v = vector([1,2,3])
P = implicit_plot3d(lambda x,y,z: v.dot_product(vector([x,y,z])), (-3,3), (-3,3), (-3,3),color=Color("#0077BB"),frame=True,axes=True,opacity=.8)
P.plot()+v.plot(color=Color("#CC3311"),thickness=3,frame=False)
    </script></div>

<h2>Intersection de deux hyperplans</h2>
Cliquez sur "Évaluer" pour exécuter le code.
    <div class="compute"><script type="text/x-sage">
H.<x,y,z> = HyperplaneArrangements(QQ)
V = VectorSpace(QQ,3)
f = linear_transformation(Matrix(QQ,[[1,0,-1],[1,-3,0],[4,-13,1]]))
def subspace_to_hyperplane(U):
    e,f = U.basis()
    w = e.cross_product(f)
    return sum(a*b for a,b in zip(w,[x,y,z]))
u,v=vector([1,-1,1]),vector([1,0,0])
U = V.subspace([u,v])
fU = V.subspace([f(u),f(v)])
subspace_to_hyperplane(U).plot(mesh=True,opacity=.5) + subspace_to_hyperplane(fU).plot(mesh=True,opacity=.5,color="green")
</script></div>
  </body>
</html>
