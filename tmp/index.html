
<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Rotation</title>
    <script src="https://sagecell.sagemath.org/static/embedded_sagecell.js"></script>
    <script>
    // Make the div with id 'mycell' a Sage cell
    sagecell.makeSagecell({inputLocation:  '#mycell',
                           template:       sagecell.templates.minimal,
                           evalButtonText: 'Activer'});
    // Make *any* div with class 'compute' a Sage cell
    sagecell.makeSagecell({inputLocation: 'div.compute',
                           evalButtonText: 'Évaluer'});
    </script>
  </head>
  <body>
  <h1> Codage binaire d'une rotation du cercle</h1>

  Cliquez sur "Activer" pour débuter la visualisation.
    <div id="mycell"><script type="text/x-sage">
@interact
def f(n=slider(0,20,1,0,"itérations")):
    alpha = 1/golden_ratio
    Ia = arc((0,0), 1, sector=(0,2*pi*(alpha)),axes=False)
    Ib = arc((0,0), 1, sector=(0,2*pi*(alpha-1)),color="red")
    P = [point((cos(k*(1-alpha)*2*pi),sin(k*(1-alpha)*2*pi)),color="black",size=50) for k in range(n+1)]
    T = [text("x_"+str(k),(1.1*cos(k*(1-alpha)*2*pi),1.1*sin(k*(1-alpha)*2*pi)),color="black") for k in range(n+1)]
    x = WordMorphism('a->ab,b->a')
    W = text(str(x.fixed_point('a')[:n]), (0,-1.4),fontsize=15,color="black")
    display(sum(P)+sum(T)+W+Ia+Ib)
    </script></div>
  </body>
</html>
